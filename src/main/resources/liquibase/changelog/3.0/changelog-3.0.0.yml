databaseChangeLog:
  - changeSet:
      id: create-user-table
      author: laman
      changes:
        - createTable:
            tableName: users
            columns:

              - column:
                  name: id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: names
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: roles
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: active_status
                  type: BOOLEAN
                  constraints:
                    nullable: false

              - column:
                  name: created_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false